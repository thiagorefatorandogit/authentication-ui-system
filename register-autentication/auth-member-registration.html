<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscrição Institucional | Registro</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="bg-slate-50 font-sans text-slate-900">

  <main class="min-h-screen flex items-center justify-center px-6 py-10">

    <section class="w-full max-w-md">

      <div class="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 p-10 border border-slate-100">

        <header class="mb-10 text-center">
          <h1 class="text-4xl font-black text-slate-800 tracking-tight uppercase">
            Registro
          </h1>
          <div class="h-1 w-12 bg-emerald-500 mx-auto mt-2 rounded-full"></div>
        </header>

        <form id="register-form" class="space-y-5" novalidate>

          <!-- Nome -->
          <div class="flex flex-col gap-1.5">

            <div class="relative group">
              <input
                type="text"
                id="inputName"
                name="name"
                class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300"
                placeholder="Como deseja ser chamado?"
              />
            </div>

            <div id="name-error"></div>

          </div>


          <!-- Email -->
          <div class="flex flex-col gap-1.5">

            <div class="relative group">
              <input
                type="email"
                id="inputEmail"
                name="email"
                class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300"
                placeholder="Seu melhor e-mail"
              />
            </div>

            <div id="email-error"></div>

          </div>


          <!-- Senha -->
          <div class="flex flex-col gap-1.5">

            <div class="relative">
              <input
                type="password"
                id="inputPassword"
                name="password"
                class="w-full px-5 py-4 pr-12 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300"
                placeholder="Crie uma senha segura"
              />

              <i
                id="togglePassword"
                class="fa-solid fa-eye absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-slate-700">
              </i>
            </div>

            <div id="password-error"></div>

          </div>


          <!-- Confirmar Senha -->
          <div class="flex flex-col gap-1.5">

            <div class="relative">
              <input
                type="password"
                id="inputConfirmPassword"
                name="confirmPassword"
                class="w-full px-5 py-4 pr-12 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300"
                placeholder="Confirme sua senha"
              />

              <i
                id="toggleConfirmPassword"
                class="fa-solid fa-eye absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400 hover:text-slate-700">
              </i>
            </div>

            <div id="confirm-password-error"></div>

          </div>


          <button type="submit"
            class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-xl transition-all active:scale-[0.97] mt-2">
            Criar Conta
          </button>

          <p class="text-center text-sm text-slate-500 pt-2">
            Já possui uma conta?
            <a href="../login-autentication/member-login-portal.html"
              class="text-emerald-600 hover:text-emerald-700 font-semibold transition-colors">
              Fazer login
            </a>
          </p>

        </form>

      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/just-validate@4.3.0/dist/just-validate.production.min.js"></script>
  <script src="../js/register-validation.js"></script>

</body>

</html>
