<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscrição Institucional | Registro</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="bg-slate-50 font-sans text-slate-900">

  <main class="min-h-screen flex items-center justify-center px-6 py-10">

    <section class="w-full max-w-md">

      <div
        class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 p-8 md:p-12 border border-slate-100">

        <header class="text-center mb-10">
          <h1 class="text-2xl font-bold tracking-tight text-slate-800">
            Nova Inscrição
          </h1>
          <p class="text-slate-500 text-sm mt-2">
            Preencha os dados para criar seu perfil de membro
          </p>
        </header>

        <form id="register-form" class="space-y-4" novalidate>

          <!-- Nome -->
          <div class="space-y-1">
            <div class="relative group flex items-center">
              <i
                class="fa-solid fa-user absolute left-4 inset-y-0 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
              </i>
              <input type="text" id="inputName" name="name"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white placeholder:text-slate-300"
                placeholder="Como deseja ser chamado?" />
            </div>
            <div id="name-error" class="text-sm text-red-500 min-h-[20px]"></div>
          </div>

          <!-- Email -->
          <div class="space-y-1">
            <div class="relative group flex items-center">
              <i
                class="fa-solid fa-envelope absolute left-4 inset-y-0 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
              </i>
              <input type="email" id="inputEmail" name="email"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white placeholder:text-slate-300"
                placeholder="Seu melhor e-mail" />
            </div>
          </div>

          <!-- Senha -->
          <div class="space-y-1">
            <div class="relative group flex items-center">
              <i
                class="fa-solid fa-lock absolute left-4 inset-y-0 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
              </i>
              <input type="password" id="inputPassword" name="password"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white placeholder:text-slate-300"
                placeholder="Crie uma senha segura" />
            </div>
          </div>

          <!-- Confirmar Senha -->
          <div class="space-y-1">
            <div class="relative group flex items-center">
              <i
                class="fa-solid fa-shield-check absolute left-4 inset-y-0 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
              </i>
              <input type="password" id="inputConfirmPassword" name="confirmPassword"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white placeholder:text-slate-300"
                placeholder="Confirme sua senha" />
            </div>
          </div>

          <!-- Telefone -->
          <div class="space-y-1">
            <div class="relative group flex items-center">
              <i
                class="fa-solid fa-phone absolute left-4 inset-y-0 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
              </i>
              <input type="tel" id="inputPhone" name="phone"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-12 pr-4 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white placeholder:text-slate-300"
                placeholder="Telefone (opcional)" />
            </div>
          </div>

          <button type="submit"
            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-2xl shadow-md transition-all duration-300 hover:shadow-lg active:scale-95">
            Criar Conta
          </button>

          <p class="text-center text-sm text-slate-500 pt-2">
            Já possui uma conta?
            <a href="../login-autentication/member-login-portal.html"
              class="text-emerald-600 hover:text-emerald-700 font-semibold transition-colors">
              Fazer login
            </a>
          </p>

        </form>

      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/just-validate@4.3.0/dist/just-validate.production.min.js"></script>
  <script src="../js/register-validation.js"></script>

</body>

</html>
