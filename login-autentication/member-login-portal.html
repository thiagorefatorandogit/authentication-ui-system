<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscrição Institucional | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body class="bg-slate-50 font-sans text-slate-900">

  <main class="min-h-screen flex items-center justify-center px-6 py-10">

    <section class="w-full max-w-md">
      <div class="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 p-10 border border-slate-100">

        <header class="mb-10 text-center">
          <h1 class="text-4xl font-black text-slate-800 tracking-tight uppercase">
            Login
          </h1>
          <div class="h-1 w-12 bg-emerald-500 mx-auto mt-2 rounded-full"></div>
        </header>

        <form id="login-form" class="space-y-5" novalidate>

          <div class="flex flex-col gap-1.5">
            <label for="loginEmail" class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">
              E-mail
            </label>
            <input type="email" id="loginEmail" name="email" placeholder="exemplo@email.com"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300" />
            <div id="email-error" class="text-[11px] text-red-500 font-semibold px-1 mt-0.5">
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <div class="flex justify-between items-center px-1">
              <label for="loginPassword" class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                Senha
              </label>
            </div>
            <input type="password" id="loginPassword" name="password" placeholder="••••••••"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 transition-all focus:bg-white focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none placeholder:text-slate-300" />

            <a href="#" class="text-xs text-right font-bold text-emerald-600 hover:text-emerald-700 transition-colors">
              Esqueceu a senha?
            </a>

            <div id="password-error" class="text-[11px] text-red-500 font-semibold px-1 mt-0.1">
            </div>
          </div>

          <button type="submit"
            class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-xl transition-all active:scale-[0.97] mt-2">
            Acessar
          </button>

          <p class="text-center text-sm text-slate-400 font-medium pt-4">
            Não tem conta?
            <a href="../register-autentication/auth-member-registration.html"
              class="text-emerald-600 font-bold hover:underline">Cadastre-se</a>
          </p>
        </form>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/just-validate@4.3.0/dist/just-validate.production.min.js"></script>
  <script src="../js/login-validation.js"></script>

</body>

</html>
